    <style>
       .mesh-bg {

            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #fdfbfb 0%, #fff5f7 100%);
            overflow: hidden;
        }

        .mesh-bg::after {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle at center, rgba(255,192,203,0.15) 0%, transparent 50%);
            animation: meshMove 20s linear infinite;
        }

        @keyframes meshMove {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

.canvas-area {
    background-image: radial-gradient(#fee2e2 1px, transparent 1px);
    background-size: 20px 20px;
    background-color: #ffffff !important;
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 8;
    min-height: 500px;
    touch-action: none; 
    -webkit-overflow-scrolling: touch;
}

        .draggable { 
            position: absolute !important; 
            touch-action: none; 
            user-select: none;
            cursor: move;
            will-change: transform; 
        }

        .draggable.selected {
            outline: 4px solid #ec4899 !important;
            outline-offset: 2px;
            z-index: 999 !important;
        }
 .exporting .draggable { outline: none !important; box-shadow: none !important; }
.exporting .mesh-bg::after { animation: none !important; }
        body.high-contrast .canvas-area { border: 4px solid #000; background-image: none; }
        body.dyslexia-mode * { font-family: 'OpenDyslexic', sans-serif !important; }
        body.reduced-motion .mesh-bg::after { animation: none; }
        
.animate-spin { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        #collage-canvas {
    transition: transform 0.3s ease-in-out;
    /* Keeps the canvas from being cut off when scaled */
    max-width: none !important; 
}

/* Ensure the container can handle the scaling */
.xl\:col-span-4 {
    overflow: hidden;
}
    </style>
</head>

    <main class="max-w-[1600px] mx-auto p-6 md:p-10 relative z-10">

                                <button onclick="setNoteColor('bg-pink-100', 'text-pink-700')" class="w-6 h-6 rounded-full bg-pink-100 border border-pink-200"></button>
                                <button onclick="setNoteColor('bg-blue-100', 'text-blue-700')" class="w-6 h-6 rounded-full bg-blue-100 border border-blue-200"></button>
                                <button onclick="setNoteColor('bg-emerald-100', 'text-emerald-700')" class="w-6 h-6 rounded-full bg-emerald-100 border border-emerald-200"></button>

                            <button onclick="clearCanvas()" class="w-full bg-white border-2 border-red-100 p-4 rounded-2xl font-bold text-xs hover:bg-red-50 text-red-500 transition-all mt-2">
    🗑️ Clear Workspace
</button>
                        </div>
                    </div>
<div class="pt-2">
    <button onclick="toggleView()" id="viewBtn" class="w-full bg-indigo-500 text-white p-3 rounded-2xl font-bold text-[10px] hover:bg-indigo-600 shadow-md transition-all">

                    <div class="pt-4 border-t border-pink-50">

                    <div id="placeholder" class="absolute inset-0 flex items-center justify-center pointer-events-none opacity-20">

                    </div>
                </div>
            </div>
        </div>
    </main>

  <script>
document.addEventListener('DOMContentLoaded', () => {
    let selectedElement = null;
    let topZIndex = 100;

    // --- IMPROVED DRAGGABLE LOGIC (Mouse + Touch) ---
    function makeDraggable(el) {
        let x = 0, y = 0, mx = 0, my = 0;

        const onStart = (e) => {
            if (e.target.tagName === 'TEXTAREA') return;
            // Handle both touch and mouse
            const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;

            mx = clientX; 
            my = clientY;

            document.addEventListener('mousemove', onMove, { passive: false });
            document.addEventListener('touchmove', onMove, { passive: false });
            document.addEventListener('mouseup', onEnd);
            document.addEventListener('touchend', onEnd);
        };

        const onMove = (e) => {
            // Prevent scrolling while dragging on mobile
            if (e.type === 'touchmove') e.preventDefault();

            const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;

            x = mx - clientX;
            y = my - clientY;
            mx = clientX;
            my = clientY;

            el.style.top = (el.offsetTop - y) + "px";
            el.style.left = (el.offsetLeft - x) + "px";
        };

        const onEnd = () => {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('touchmove', onMove);
        };

        el.addEventListener('mousedown', onStart);
        el.addEventListener('touchstart', onStart, { passive: false });
    }

    // --- WINDOW SCOPED FUNCTIONS ---
    window.selectItem = (el) => {
        if (selectedElement) selectedElement.classList.remove('selected');
        selectedElement = el;
        selectedElement.classList.add('selected');
        const extras = document.getElementById('noteExtras');
        if (extras) extras.classList.toggle('hidden', !el.classList.contains('note-item'));
    };

    window.handleImageUpload = (event) => {
        const files = event.target.files;
        const placeholder = document.getElementById('placeholder');
        if (placeholder) placeholder.style.display = 'none';

        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const div = document.createElement('div');
                div.className = "draggable p-2 bg-white shadow-xl rounded-lg";
                div.style.left = "20px"; div.style.top = "20px"; div.style.width = "250px";
                div.dataset.rot = 0;
                div.style.zIndex = topZIndex++;
                div.innerHTML = `<img src="${e.target.result}" class="w-full rounded pointer-events-none block">`;
                
                div.addEventListener('mousedown', (ev) => { ev.stopPropagation(); window.selectItem(div); });
                div.addEventListener('touchstart', (ev) => { window.selectItem(div); });
                
                makeDraggable(div);
                document.getElementById('collage-canvas').appendChild(div);
                window.selectItem(div);
            };
            reader.readAsDataURL(file);
        });
    };

    window.addNote = () => {
        const placeholder = document.getElementById('placeholder');
        if (placeholder) placeholder.style.display = 'none';
        const div = document.createElement('div');
        div.className = "draggable note-item p-4 bg-pink-100 rounded-2xl shadow-lg border border-pink-200";
        div.style.left = "40px"; div.style.top = "40px"; div.style.width = "200px";
        div.dataset.rot = 0;
        div.style.zIndex = topZIndex++;
        div.innerHTML = `<textarea class="w-full h-24 bg-transparent border-none outline-none text-[13px] font-bold text-pink-700 placeholder-pink-300 resize-none block"></textarea>`;
        
        div.addEventListener('mousedown', (ev) => { ev.stopPropagation(); window.selectItem(div); });
        div.addEventListener('touchstart', (ev) => { window.selectItem(div); });
        
        makeDraggable(div);
        document.getElementById('collage-canvas').appendChild(div);
        window.selectItem(div);
    };

    // --- TRANSFORM TOOLS ---
    window.changeWidth = (factor) => { if (selectedElement) selectedElement.style.width = (selectedElement.offsetWidth * factor) + "px"; };
    window.changeRotation = (deg) => {
        if (selectedElement) {
            let r = (parseInt(selectedElement.dataset.rot) || 0) + deg;
            selectedElement.dataset.rot = r;
            selectedElement.style.transform = `rotate(${r}deg)`;
        }
    };
    window.bringToFront = () => { if (selectedElement) selectedElement.style.zIndex = ++topZIndex; };
    window.deleteSelected = () => { if (selectedElement) { selectedElement.remove(); selectedElement = null; } };
    window.setNoteColor = (bg, text) => {
        if (!selectedElement) return;
        selectedElement.className = `draggable note-item p-4 rounded-2xl shadow-lg border border-pink-200 selected ${bg}`;
        const area = selectedElement.querySelector('textarea');
        if (area) area.className = `w-full h-24 bg-transparent border-none outline-none text-[13px] font-bold placeholder-pink-300 resize-none block ${text}`;
    };

    // --- FULL CANVAS EXPORT FIX ---
    window.exportCollage = async () => {
        const canvas = document.getElementById('collage-canvas');
        const btn = document.querySelector('button[onclick="exportCollage()"]');
        const originalText = btn.innerHTML;

        btn.disabled = true;
        btn.innerHTML = `✨ Rendering...`;
        document.body.classList.add('exporting');
        if (selectedElement) selectedElement.classList.remove('selected');

        try {
            // We force html2canvas to look at the scrollWidth/scrollHeight 
            // instead of the visible clientWidth
            const result = await html2canvas(canvas, { 
                backgroundColor: '#ffffff',
                scale: 2, // High quality
                useCORS: true,
                width: canvas.scrollWidth,
                height: canvas.scrollHeight,
                windowWidth: canvas.scrollWidth,
                windowHeight: canvas.scrollHeight
            });

            const link = document.createElement('a');
            link.download = `Hanafubuki-Studio-${Date.now()}.jpg`;
            link.href = result.toDataURL("image/jpeg", 0.9);
            link.click();
        } catch (err) {
            console.error(err);
            alert("Export failed! Check your connection.");
        } finally {
            document.body.classList.remove('exporting');
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    };

    window.clearCanvas = () => {
        if(confirm("Clear your workspace? ♡")) {
            const canvas = document.getElementById('collage-canvas');
            canvas.querySelectorAll('.draggable').forEach(item => item.remove());
            document.getElementById('placeholder').style.display = 'flex';
        }
    };

    // Click away to deselect
    document.getElementById('collage-canvas').addEventListener('mousedown', (e) => {
        if (e.target.id === 'collage-canvas' || e.target.id === 'placeholder') {
            if (selectedElement) selectedElement.classList.remove('selected');
            selectedElement = null;
            document.getElementById('noteExtras')?.classList.add('hidden');
        }
    });
});
      let isZoomedOut = false;

window.toggleView = () => {
    const canvas = document.getElementById('collage-canvas');
    const btn = document.getElementById('viewBtn');
    
    if (!isZoomedOut) {
        // Zoom Out: Scale the canvas down to fit the container width
        const containerWidth = canvas.parentElement.offsetWidth;
        const canvasWidth = canvas.offsetWidth;
        const scale = containerWidth / canvasWidth;
        
        canvas.style.transformOrigin = "top left";
        canvas.style.transform = `scale(${scale * 0.95})`; // 0.95 for a little padding
        btn.innerHTML = "🔍 Zoom In (Edit Mode)";
        isZoomedOut = true;
    } else {
        // Zoom In: Back to normal size for editing
        canvas.style.transform = "scale(1)";
        btn.innerHTML = "🔍 Zoom Out (Full View)";
        isZoomedOut = false;
    }
};

// Crucial: Update the Export function to reset zoom before saving
const originalExport = window.exportCollage;
window.exportCollage = async () => {
    const canvas = document.getElementById('collage-canvas');
    const wasZoomed = isZoomedOut;
    
    // Reset zoom temporarily for a clean high-res export
    if (wasZoomed) canvas.style.transform = "scale(1)";
    
    await originalExport();
    
    // Put it back how the user had it
    if (wasZoomed) {
        const scale = canvas.parentElement.offsetWidth / canvas.offsetWidth;
        canvas.style.transform = `scale(${scale * 0.95})`;
    }
};
</script>
